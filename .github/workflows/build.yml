name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:   # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c        # NDK 27，当前 LTS 版本
          add-to-path: false

      - name: Build arm64-v8a
        run: |
          cmake \
            -S . -B build/arm64 \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-27 \
            -DANDROID_STL=c++_static
          cmake --build build/arm64 --target wxwork-tablet -j$(nproc)

      - name: Build armeabi-v7a
        run: |
          cmake \
            -S . -B build/arm32 \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-27 \
            -DANDROID_STL=c++_static
          cmake --build build/arm32 --target wxwork-tablet -j$(nproc)

      - name: Package Magisk module
        run: |
          mkdir -p dist/zygisk
          cp build/arm64/libwxwork-tablet.so dist/zygisk/arm64-v8a.so
          cp build/arm32/libwxwork-tablet.so dist/zygisk/armeabi-v7a.so
          cp -r module-files/. dist/
          cd dist && zip -r9 ../wxwork-tablet-v1.0.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wxwork-tablet
          path: wxwork-tablet-v1.0.zip
          if-no-files-found: error
