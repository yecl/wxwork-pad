name: Build

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Compile Java and generate dex_bytes.h
        run: |
          mkdir -p /tmp/dex-build
          # Compile WxWorkCallback.java targeting Java 8 bytecode
          javac -source 8 -target 8 java/WxWorkCallback.java -d /tmp/dex-build/
          # Find d8 from Android SDK build-tools (runner has ANDROID_HOME set)
          D8=$(find "$ANDROID_HOME/build-tools" -name d8 -type f | sort -V | tail -1)
          echo "Using d8: $D8"
          "$D8" --output /tmp/dex-build/ --min-api 26 /tmp/dex-build/WxWorkCallback.class
          # Generate C header with renamed variables
          cd /tmp/dex-build
          xxd -i classes.dex \
            | sed 's/^unsigned char classes_dex\[\]/const unsigned char kHookerDex[]/;
                   s/^unsigned int classes_dex_len/const unsigned int kHookerDexSize/' \
            > "$GITHUB_WORKSPACE/jni/dex_bytes.h"
          echo "dex_bytes.h generated ($(wc -c < classes.dex) bytes DEX)"

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Build arm64-v8a
        run: |
          cmake \
            -S . -B build/arm64 \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-27 \
            -DANDROID_STL=c++_static
          cmake --build build/arm64 --target wxwork-tablet -j$(nproc)

      - name: Build armeabi-v7a
        run: |
          cmake \
            -S . -B build/arm32 \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.setup-ndk.outputs.ndk-path }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-27 \
            -DANDROID_STL=c++_static
          cmake --build build/arm32 --target wxwork-tablet -j$(nproc)

      - name: Package Magisk module
        run: |
          mkdir -p dist/zygisk
          cp build/arm64/libwxwork-tablet.so dist/zygisk/arm64-v8a.so
          cp build/arm32/libwxwork-tablet.so dist/zygisk/armeabi-v7a.so
          cp -r module-files/. dist/
          cd dist && zip -r9 ../wxwork-tablet-v1.0.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wxwork-tablet
          path: wxwork-tablet-v1.0.zip
          if-no-files-found: error
